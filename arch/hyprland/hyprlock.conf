general {
    hide_cursor = true
    grace = 0
}

background {
    monitor =
    path = screenshot
    blur_passes = 2
    blur_size = 7
    brightness = 0.6
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.3
    fade_on_empty = true
    placeholder_text = <i>Contraseña...</i>
    halign = center
    valign = center
    position = 0, -100
}

label {
    monitor =
    text = $TIME
    font_size = 72
    font_family = JetBrains Mono
    halign = center
    valign = center
    position = 0, 100
}

label {
    monitor =
    text = cmd[update:60000] date "+%A, %d de %B"
    font_size = 20
    font_family = JetBrains Mono
    halign = center
    valign = center
    position = 0, 30
}
